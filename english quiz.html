<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English 8 - Master Edition</title>
    <style>
        :root { --primary: #00d4ff; --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --accent: #ffcc00; --success: #00ff88; --danger: #ff4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); max-width: 850px; margin: auto; padding: 20px; text-align: center; }
        h1 { color: var(--primary); text-transform: uppercase; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        #toast { position: fixed; bottom: -60px; left: 50%; transform: translateX(-50%); background: var(--success); color: #000; padding: 12px 25px; border-radius: 50px; font-weight: bold; z-index: 10002; transition: 0.4s; opacity: 0; pointer-events: none; }
        #toast.show { bottom: 30px; opacity: 1; }
        .wallet-bar { background: var(--card); padding: 10px 20px; border-radius: 50px; border: 1px solid var(--primary); display: inline-block; margin-bottom: 20px; font-weight: bold; color: var(--primary); }
        .question-card { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #30363d; text-align: left; }
        .options { display: grid; gap: 10px; margin-top: 15px; }
        button.option { background: #21262d; color: var(--text); border: 1px solid #30363d; padding: 12px; border-radius: 8px; cursor: pointer; text-align: left; transition: 0.2s; font-size: 1em; }
        button.option:hover:not(:disabled) { border-color: var(--primary); background: #30363d; }
        .correct { background: #238636 !important; border-color: #2ea043 !important; }
        .wrong { background: #da3633 !important; border-color: #f85149 !important; }
        .revive-btn { margin-top: 10px; background: var(--accent); color: #000; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .btn-submit { padding: 15px; background: var(--primary); color: #000; font-weight: bold; border-radius: 8px; cursor: pointer; border: none; margin-top: 20px; font-size: 1.1em; width: 100%; }
        #result { text-align: center; font-size: 1.5em; margin-top: 20px; display: none; font-weight: bold; padding: 25px; border-radius: 15px; background: rgba(0,0,0,0.4); border: 2px solid var(--primary); }
    </style>
</head>
<body>
    <div id="toast"></div>
    <h1>CHECK ANH 8</h1>
    <div class="wallet-bar">💰 Tài khoản: <span id="user-points-display">0</span> ⭐</div>
    <div id="quiz-content">Đang triệu hồi pháp thuật...</div>
    <button class="btn-submit" onclick="showResults()">CHẤM ĐIỂM NGAY</button>
    <div id="result"></div>
    <button class="btn-submit" style="background:#21262d; color:#fff;" onclick="location.href='index.html'">⬅️ QUAY LẠI</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6-e4i-Bo5nrjV-_KmyLGPrZom07Zzgr0",
            authDomain: "onthihocki.firebaseapp.com",
            databaseURL: "https://onthihocki-default-rtdb.firebaseio.com",
            projectId: "onthihocki",
            appId: "1:225768990288:web:76c48c3067635c7e675355"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let userData = JSON.parse(localStorage.getItem('quan_phap_su_data')) || { points: 0, userName: null, banUntil: null };

        // Kiểm tra lệnh BAN
        if (userData.banUntil && new Date().getTime() < userData.banUntil) {
            alert(`⛔ Ông đang bị cấm thi! Hết hạn sau ít phút nữa.`);
            location.href = "index.html";
        }

        const questions = [
            { q: "Pronunciation: measure, theater, idea, fear", a: ["measure", "theater", "idea", "fear"], c: "measure" },
            { q: "Pronunciation: heart, peach, dream, team", a: ["heart", "peach", "dream", "team"], c: "heart" },
            { q: "Stress: pretty, central, simple, alone", a: ["alone", "pretty", "central", "simple"], c: "alone" },
            { q: "Humans can’t live unless they have enough ___________ to breathe.", a: ["oxygen", "water", "planets", "food"], c: "oxygen" },
            { q: "After nearly a thousand years, villagers still make pottery _______ hand.", a: ["by", "in", "with", "for"], c: "by" },
            { q: "The woman reported that she had seen a(n) ____________ alien.", a: ["huge", "tiny", "average", "small"], c: "huge" },
            { q: "I asked her what crops ___________ in her fields.", a: ["she grew", "she grows", "does she grow"], c: "she grew" },
            { q: "He asked if Bánh Chưng ______________ from sticky rice.", a: ["was made", "made", "is made"], c: "was made" },
            { q: "This puzzle is ___________ than the one yesterday.", a: ["harder", "hard", "more hardly"], c: "harder" },
            { q: "Without __________, objects wouldn't stay on the ground.", a: ["gravity", "oxygen", "temperature"], c: "gravity" },
            { q: "Yesterday, while I ___________ TV, the power went out.", a: ["was watching", "watch", "watched"], c: "was watching" },
            { q: "Whose shoes are these? They're __________. ", a: ["theirs", "their", "them"], c: "theirs" },
            { q: "They said they __________ to the party the next day.", a: ["would go", "will go", "went"], c: "would go" },
            { q: "The doctor asked her __________ any medication.", a: ["if she took", "if she takes", "if she will take"], c: "if she took" },
            { q: "Viet Nam has 54 ethnic groups.", a: ["There are 54 ethnic groups in Viet Nam.", "There were 54 people."], c: "There are 54 ethnic groups in Viet Nam." },
            { q: "James: 'I will fly around the world in my jet.'", a: ["James said he would fly around the world", "James said he flies"], c: "James said he would fly around the world" },
            { q: "Venus and Earth are almost the same size.", a: ["Venus is as big as the Earth.", "Venus is bigger"], c: "Venus is as big as the Earth." },
            { q: "“Do you want to spend your holiday in an ethnic village?”", a: ["My sister asked if I wanted to spend my holiday", "My sister asked where I go"], c: "My sister asked if I wanted to spend my holiday" },
            { q: "A UFO can be a disk-shaped or egg-shaped object.", a: ["True", "False", "Doesn't say"], c: "True" },
            { q: "What technology helps Sophia recognize voices?", a: ["Voice recognition from Alphabet Inc.", "Facial recognition"], c: "Voice recognition from Alphabet Inc." }
        ];

        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            if(t) { t.innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
        };

        window.save = () => {
            localStorage.setItem('quan_phap_su_data', JSON.stringify(userData));
            document.getElementById('user-points-display').innerText = userData.points;
            if (userData.userName) set(ref(db, 'ranks/' + userData.userName), { points: userData.points });
        };

        window.check = (btn, sel, cor, card) => {
            card.querySelectorAll('button').forEach(b => b.disabled = true);
            if(sel === cor) { 
                btn.classList.add('correct'); userData.points += 2; window.showToast("🔥 ĐÚNG! +2đ"); 
            } else { 
                btn.classList.add('wrong'); window.showToast("❌ SAI RỒI!"); 
                if(userData.points >= 100) {
                    const rb = document.createElement('button');
                    rb.className = 'revive-btn'; rb.innerText = "🆘 Hồi sinh (100⭐)";
                    rb.onclick = () => {
                        userData.points -= 100; window.save();
                        card.querySelectorAll('button').forEach(b => { if(!b.classList.contains('revive-btn')) b.disabled = false; b.classList.remove('wrong'); });
                        rb.remove();
                    };
                    card.appendChild(rb);
                }
            }
            window.save();
        };

        window.showResults = () => {
            const res = document.getElementById('result');
            const correctCount = document.querySelectorAll('.correct').length;
            const total = questions.length;
            res.style.display = 'block';

            let comment = "";
            let color = "";

            if (correctCount === total) {
                comment = "🔥 QUÁ GIỎI PHÁP SƯ ƠI! Tuyệt đối luôn.";
                color = "var(--success)";
            } else if (correctCount >= total / 2) {
                comment = "✨ Ổn phết! Tiếp tục phát huy nhé.";
                color = "var(--accent)";
            } else {
                comment = "📚 Cần cố gắng nhiều hơn ông ơi, hổng kiến thức rồi!";
                color = "var(--danger)";
            }

            res.innerHTML = `
                <div style="font-size: 0.7em; color: var(--primary);">BÁO CÁO KẾT QUẢ</div>
                <div style="color: ${color}; font-size: 1.2em;">${correctCount}/${total} Câu Đúng</div>
                <div style="margin-top: 10px; color: ${color}; font-size: 0.8em; font-style: italic;">"${comment}"</div>
            `;
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        };

        // --- ANTI CHEAT ---
        let cheatCount = 0;
        window.applyPenalty = function() {
            cheatCount++;
            if (cheatCount >= 2) {
                userData.points = 0; userData.banUntil = new Date().getTime() + (5 * 60 * 1000); window.save();
                alert("🚫 VI PHẠM QUÁ 2 LẦN! Reset điểm và BAN 5 phút.");
                location.href = "index.html";
            } else { alert("⚠️ CẢNH BÁO: Không rời trang hoặc dùng phím tắt trái phép!"); }
        };

        document.addEventListener("visibilitychange", () => { if (document.hidden) window.applyPenalty(); });
        window.addEventListener('keydown', (e) => {
            const forbidden = ['c', 'v', 'u', 's'];
            if (e.key === "F11" || (e.ctrlKey && forbidden.includes(e.key.toLowerCase()))) {
                e.preventDefault(); window.applyPenalty();
            }
        });
        document.addEventListener('contextmenu', e => e.preventDefault());

        // RENDER
        const container = document.getElementById('quiz-content');
        container.innerHTML = "";
        [...questions].sort(() => Math.random() - 0.5).forEach((item, idx) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.innerHTML = `<h3>Câu ${idx + 1}: ${item.q}</h3><div class="options"></div>`;
            [...item.a].sort(() => Math.random() - 0.5).forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option'; btn.innerText = `${String.fromCharCode(65 + i)}. ${opt}`;
                btn.onclick = () => window.check(btn, opt, item.c, card);
                card.querySelector('.options').appendChild(btn);
            });
            container.appendChild(card);
        });

        window.save();
    </script>
</body>
</html>
