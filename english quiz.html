<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English 8 - Final Fix</title>
    <style>
        :root { --primary: #00d4ff; --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --accent: #ffcc00; --success: #00ff88; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); max-width: 900px; margin: auto; padding: 20px; }
        h1 { text-align: center; color: var(--primary); border-bottom: 2px solid var(--primary); padding-bottom: 10px; text-transform: uppercase; }
        #toast { position: fixed; bottom: -60px; left: 50%; transform: translateX(-50%); background: var(--success); color: #000; padding: 12px 25px; border-radius: 50px; font-weight: bold; box-shadow: 0 0 20px rgba(0,255,136,0.5); z-index: 10002; transition: 0.4s; opacity: 0; pointer-events: none; }
        #toast.show { bottom: 30px; opacity: 1; }
        .wallet-bar { background: var(--card); padding: 10px 20px; border-radius: 50px; border: 1px solid var(--primary); display: block; margin: 0 auto 20px auto; width: fit-content; font-weight: bold; color: var(--primary); }
        .question-card { background: var(--card); padding: 18px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #30363d; }
        .options { display: grid; gap: 8px; margin-top: 12px; }
        button.option { background: #21262d; color: var(--text); border: 1px solid #30363d; padding: 10px; border-radius: 6px; cursor: pointer; text-align: left; transition: 0.2s; }
        button.option:hover:not(:disabled) { border-color: var(--primary); background: #30363d; }
        .correct { background: #238636 !important; border-color: #2ea043 !important; }
        .wrong { background: #da3633 !important; border-color: #f85149 !important; }
        .btn-submit { width: 100%; padding: 15px; background: var(--primary); color: #000; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 1.2em; margin-top: 20px; border: none; }
        #result { text-align: center; font-size: 1.5em; margin-top: 20px; display: none; font-weight: bold; padding: 20px; border-radius: 15px; background: rgba(0,0,0,0.3); border: 2px solid var(--primary); }
        .back-link { display: block; text-align: center; margin-top: 20px; color: var(--primary); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div id="toast"></div>
    <h1>CHECK ANH 8</h1>
    <div class="wallet-bar">💰 Tài khoản: <span id="user-points-display">0</span> ⭐</div>
    <div id="quiz-content">Đang tải câu hỏi...</div>
    <button class="btn-submit" onclick="showResults()">CHẤM ĐIỂM </button>
    <div id="result"></div>
    <a href="index.html" class="back-link">⬅️ Quay lại Sảnh chính</a>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6-e4i-Bo5nrjV-_KmyLGPrZom07Zzgr0",
            authDomain: "onthihocki.firebaseapp.com",
            databaseURL: "https://onthihocki-default-rtdb.firebaseio.com",
            projectId: "onthihocki",
            storageBucket: "onthihocki.firebasestorage.app",
            messagingSenderId: "225768990288",
            appId: "1:225768990288:web:76c48c3067635c7e675355"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let userData = JSON.parse(localStorage.getItem('quan_phap_su_data')) || { points: 0, userName: null, lastCheckIn: null };
        let answeredCount = 0, bonusReceived = false, isFinished = false;

        window.showToast = function(msg) {
            const t = document.getElementById('toast');
            if(t) { t.innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
        };

        window.save = function() { 
            localStorage.setItem('quan_phap_su_data', JSON.stringify(userData)); 
            if(document.getElementById('user-points-display')) document.getElementById('user-points-display').innerText = userData.points;
            if (userData.userName) set(ref(db, 'ranks/' + userData.userName), { points: userData.points });
        };

        const allQuestions = [
            { q: "Pronunciation: measure, theater, idea, fear", a: ["measure", "theater", "idea", "fear"], c: "measure" },
            { q: "Pronunciation: heart, peach, dream, team", a: ["heart", "peach", "dream", "team"], c: "heart" },
            { q: "Stress: pretty, central, simple, alone", a: ["alone", "pretty", "central", "simple"], c: "alone" },
            { q: "Humans can’t live unless they have enough ___________ to breathe.", a: ["oxygen", "water", "planets", "food"], c: "oxygen" },
            { q: "After nearly a thousand years, villagers still make pottery _______ hand.", a: ["by", "in", "with", "for"], c: "by" }
        ];

        window.startQuiz = function() {
            const container = document.getElementById('quiz-content');
            if(!container) return;
            container.innerHTML = "";
            allQuestions.forEach((item, idx) => {
                const card = document.createElement('div'); card.className = 'question-card';
                card.innerHTML = `<h3>Q${idx + 1}: ${item.q}</h3>`;
                const optDiv = document.createElement('div'); optDiv.className = 'options';
                item.a.forEach((opt, i) => {
                    const btn = document.createElement('button'); btn.className = 'option';
                    btn.innerText = `${String.fromCharCode(65 + i)}. ${opt}`;
                    btn.onclick = () => window.check(btn, opt, item.c, optDiv);
                    optDiv.appendChild(btn);
                });
                card.appendChild(optDiv); container.appendChild(card);
            });
            window.save();
        };

        window.check = function(btn, sel, cor, container) {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(e => {});
            container.querySelectorAll('button').forEach(b => b.disabled = true);
            answeredCount++;
            if (answeredCount === 5 && !bonusReceived) { userData.points += 10; bonusReceived = true; window.showToast("🔥 CHUYÊN CẦN: +10đ!"); }
            if (sel === cor) { btn.classList.add('correct'); userData.points += 2; }
            else { btn.classList.add('wrong'); }
            window.save();
        };

        window.showResults = function() {
            isFinished = true;
            const res = document.getElementById('result');
            res.style.display = 'block';
            res.innerText = `KẾT QUẢ: ${document.querySelectorAll('.correct').length}/${allQuestions.length}. Làm tốt lắm!`;
            window.scrollTo(0, document.body.scrollHeight);
        };

        window.addEventListener("keydown", (e) => {
            if (e.key === "F11") { 
                e.preventDefault(); 
                const today = new Date().toLocaleDateString();
                if (userData.lastCheckIn === today) { window.showToast("🎁 Đã nhận quà hôm nay rồi!"); } 
                else { userData.points += 10; userData.lastCheckIn = today; window.save(); window.showToast("💰 CHUYÊN CẦN: +10đ!"); }
            }
        });

        window.onload = window.startQuiz;
    </script>
</body>
</html>
