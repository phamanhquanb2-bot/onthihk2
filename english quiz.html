<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English 8 - Fix 100%</title>
    <style>
        :root { --primary: #00d4ff; --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --success: #00ff88; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); text-align: center; padding: 20px; }
        #toast { position: fixed; bottom: -60px; left: 50%; transform: translateX(-50%); background: var(--success); color: #000; padding: 12px 25px; border-radius: 50px; font-weight: bold; transition: 0.4s; opacity: 0; z-index: 10002; pointer-events: none; }
        #toast.show { bottom: 30px; opacity: 1; }
        .question-card { background: var(--card); padding: 15px; margin: 15px auto; border-radius: 10px; border: 1px solid #30363d; max-width: 600px; text-align: left; }
        button { background: #21262d; color: #fff; border: 1px solid #30363d; padding: 10px 15px; margin: 5px; cursor: pointer; border-radius: 6px; }
        .correct { background: #238636 !important; }
        .wrong { background: #da3633 !important; }
    </style>
</head>
<body>
    <div id="toast"></div>
    <h1>CHECK ANH 8</h1>
    <div id="quiz-content">Đang khởi tạo câu hỏi...</div>
    <button onclick="location.href='index.html'" style="margin-top: 20px; background: var(--primary); color: #000;">⬅️ QUAY LẠI</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6-e4i-Bo5nrjV-_KmyLGPrZom07Zzgr0",
            authDomain: "onthihocki.firebaseapp.com",
            databaseURL: "https://onthihocki-default-rtdb.firebaseio.com",
            projectId: "onthihocki",
            appId: "1:225768990288:web:76c48c3067635c7e675355"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let userData = JSON.parse(localStorage.getItem('quan_phap_su_data')) || { points: 0, userName: null };

        // Hàm hiện thông báo
        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            if(t) { t.innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
        };

        // Danh sách câu hỏi rút gọn để tránh lỗi cú pháp
        const questions = [
            { q: "Humans can’t live unless they have enough oxygen.", a: ["True", "False"], c: "True" },
            { q: "Pronunciation: m(ea)sure, th(ea)ter, id(ea), f(ea)r", a: ["measure", "theater", "idea", "fear"], c: "measure" }
        ];

        window.checkAnswer = (btn, selected, correct) => {
            if (selected === correct) {
                btn.classList.add('correct');
                userData.points += 2;
                window.showToast("ĐÚNG RỒI! +2đ");
            } else {
                btn.classList.add('wrong');
                window.showToast("SAI MẤT RỒI!");
            }
            // Đồng bộ Firebase
            if (userData.userName) set(ref(db, 'ranks/' + userData.userName), { points: userData.points });
            localStorage.setItem('quan_phap_su_data', JSON.stringify(userData));
        };

        const container = document.getElementById('quiz-content');
        container.innerHTML = "";
        questions.forEach((item, idx) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.innerHTML = `<h3>Câu ${idx + 1}: ${item.q}</h3>`;
            item.a.forEach(opt => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.onclick = () => window.checkAnswer(btn, opt, item.c);
                card.appendChild(btn);
            });
            container.appendChild(card);
        });

        // Bắt phím F11
        window.addEventListener("keydown", (e) => {
            if (e.key === "F11") {
                e.preventDefault();
                userData.points += 10;
                window.showToast("💰 CHUYÊN CẦN: +10đ!");
                if (userData.userName) set(ref(db, 'ranks/' + userData.userName), { points: userData.points });
                localStorage.setItem('quan_phap_su_data', JSON.stringify(userData));
            }
        });
    </script>
</body>
</html>
