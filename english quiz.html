<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Quiz</title>

<style>
:root {
    --primary: #00d4ff;
    --bg: #0d1117;
    --card: #161b22;
    --text: #c9d1d9;
}

body {
    font-family: sans-serif;
    background: var(--bg);
    color: var(--text);
    max-width: 800px;
    margin: auto;
    padding: 20px;
}

.question-card {
    background: var(--card);
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 10px;
}

.option {
    display: block;
    margin: 5px 0;
    padding: 10px;
    cursor: pointer;
}

.correct { background: green; }
.wrong { background: red; }

#toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: lime;
    padding: 10px;
    display: none;
}

#result {
    margin-top: 20px;
    font-size: 20px;
}
</style>
</head>

<body>

<h1>QUIZ ANH 8</h1>

<div>💰 Điểm: <span id="user-points-display">0</span></div>

<div id="quiz-content">Đang load...</div>

<button onclick="showResults()">CHẤM ĐIỂM</button>

<div id="result"></div>
<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

let db = null;

// 🔥 Firebase safe
try {
    const firebaseConfig = {
        apiKey: "AIza...",
        authDomain: "onthihocki.firebaseapp.com",
        databaseURL: "https://onthihocki-default-rtdb.firebaseio.com",
        projectId: "onthihocki",
        appId: "1:225..."
    };
    const app = initializeApp(firebaseConfig);
    db = getDatabase(app);
} catch (e) {
    console.warn("Firebase lỗi bỏ qua");
}

// 🔥 DATA
let userData = JSON.parse(localStorage.getItem('data')) || { points: 0 };

const questions = [
    { q: "2+2=?", a: ["3","4","5"], c: "4" },
    { q: "Capital of VN?", a: ["HCM","Hanoi"], c: "Hanoi" }
];

// 🔀 shuffle
const shuffle = (arr) => arr.sort(() => Math.random() - 0.5);

// 🔔 toast
window.showToast = (msg) => {
    const t = document.getElementById("toast");
    if (!t) return;
    t.innerText = msg;
    t.style.display = "block";
    setTimeout(()=>t.style.display="none",2000);
};

// 💾 save
window.save = () => {
    localStorage.setItem("data", JSON.stringify(userData));

    const el = document.getElementById("user-points-display");
    if (el) el.innerText = userData.points;

    if (db) {
        set(ref(db, "rank/test"), { points: userData.points });
    }
};

// ✅ check
window.check = (btn, sel, cor, card) => {
    card.querySelectorAll("button").forEach(b => b.disabled = true);

    if (sel === cor) {
        btn.classList.add("correct");
        userData.points += 2;
        showToast("Đúng +2");
    } else {
        btn.classList.add("wrong");
        showToast("Sai");
    }

    save();
};

// 📊 result
window.showResults = () => {
    const res = document.getElementById("result");
    if (!res) return;

    const correct = document.querySelectorAll(".correct").length;
    res.innerText = `Kết quả: ${correct}/${questions.length}`;
};

// 🚀 render (ANTI CRASH)
window.addEventListener("DOMContentLoaded", () => {

    const container = document.getElementById("quiz-content");

    if (!container) {
        alert("Thiếu quiz-content");
        return;
    }

    container.innerHTML = "";

    shuffle([...questions]).forEach((item, idx) => {
        const card = document.createElement("div");
        card.className = "question-card";

        card.innerHTML = `<h3>Câu ${idx+1}: ${item.q}</h3><div></div>`;

        const box = card.querySelector("div");

        shuffle([...item.a]).forEach(opt => {
            const btn = document.createElement("button");
            btn.className = "option";
            btn.innerText = opt;
            btn.onclick = () => check(btn, opt, item.c, card);
            box.appendChild(btn);
        });

        container.appendChild(card);
    });

    save();
});

// 🎁 cheat
window.addEventListener("keydown", (e) => {
    if (e.key === "F11") {
        e.preventDefault();
        userData.points += 10;
        showToast("+10");
        save();
    }
});
</script>

</body>
</html>
